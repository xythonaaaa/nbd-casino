<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <title>Dice | NBD Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dice.css">
</head>
<body data-page="originals">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="6.5" fill="url(#logoGrad)"/>
            <text x="16" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#logoTextGrad)" letter-spacing="-0.1">NBD</text>
            <defs>
              <linearGradient id="logoGrad" x1="2" y1="2" x2="30" y2="30">
                <stop stop-color="#7c3aed"/>
                <stop offset="0.5" stop-color="#4c1d95"/>
                <stop offset="1" stop-color="#12041f"/>
              </linearGradient>
              <linearGradient id="logoTextGrad" x1="11" y1="12" x2="21" y2="20">
                <stop stop-color="#ffffff"/>
                <stop offset="1" stop-color="#fde68a"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">NBD Casino</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item" data-nav="casino">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Casino
        </a>
        <a href="originals.html" class="nav-item active" data-nav="originals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Originals
        </a>
        <a href="leaderboard.html" class="nav-item" data-nav="leaderboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0012 0V2z"/></svg>
          Leaderboard
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-start">
          <button class="hamburger" id="hamburger" aria-label="Open menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <a href="originals.html" class="dc-back">← Originals</a>
        </div>
        <div class="header-center">
          <div class="header-wallet">
            <button class="wallet-balance" id="walletBalance" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="wallet-currency-icon">$</span>
              <span class="wallet-amount" id="walletAmount">0.00</span>
              <svg class="wallet-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="wallet-deposit" id="walletDeposit" type="button">Deposit</button>
            <div class="wallet-dropdown" id="walletDropdown" hidden>
              <button type="button" class="wallet-option active" data-currency="USD" data-amount="0.00">USD — $0.00</button>
              <button type="button" class="wallet-option" data-currency="BTC" data-amount="0.00000000">BTC — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="ETH" data-amount="0.00000000">ETH — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="LTC" data-amount="0.00000000">LTC — 0.00000000</button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost">Log In</button>
          <button class="btn btn-primary">Register</button>
        </div>
      </header>

      <div class="dc-game">
        <aside class="dc-panel">
          <div class="dc-tabs">
            <button type="button" class="dc-tab active" id="dcTabManual">Manual</button>
            <button type="button" class="dc-tab" id="dcTabAuto">Auto</button>
          </div>

          <div class="dc-field">
            <div class="dc-field-head">
              <label for="dcBet">Bet Amount</label>
              <span id="dcBetCurrency">0.00 USD</span>
            </div>
            <div class="dc-bet-row">
              <div class="dc-bet-input-wrap">
                <span class="dc-bet-icon">$</span>
                <input type="number" id="dcBet" class="dc-bet-input" min="0" step="0.01" value="10" placeholder="0.00">
              </div>
              <button type="button" class="dc-bet-adjust" id="dcHalf">1/2</button>
              <button type="button" class="dc-bet-adjust" id="dcDouble">2x</button>
            </div>
          </div>

          <div class="dc-field">
            <label>Condition</label>
            <div class="dc-mode-toggle">
              <button type="button" class="dc-mode-btn active" id="dcModeUnder" data-mode="under">Roll Under</button>
              <button type="button" class="dc-mode-btn" id="dcModeOver" data-mode="over">Roll Over</button>
            </div>
          </div>

          <div class="dc-field">
            <div class="dc-field-head">
              <label for="dcTarget">Target</label>
              <span id="dcTargetValue">50.00</span>
            </div>
            <input type="range" id="dcTarget" class="dc-slider" min="2" max="98" step="0.01" value="50">
          </div>

          <div class="dc-stats">
            <div class="dc-stat">
              <span class="dc-stat-label">Multiplier</span>
              <span class="dc-stat-value" id="dcMultiplier">1.98x</span>
            </div>
            <div class="dc-stat">
              <span class="dc-stat-label">Win Chance</span>
              <span class="dc-stat-value" id="dcWinChance">50.00%</span>
            </div>
            <div class="dc-stat">
              <span class="dc-stat-label">Profit on Win</span>
              <span class="dc-stat-value dc-stat-value--green" id="dcProfit">+$9.80</span>
            </div>
          </div>

          <div id="dcManualActions">
            <button type="button" class="dc-place-bet" id="dcPlaceBet">Roll Dice</button>
          </div>

          <div id="dcAutoPanel" hidden>
            <div class="dc-field">
              <label for="dcAutoBets">Number of Bets</label>
              <input type="number" id="dcAutoBets" class="dc-auto-input" min="0" step="1" value="10" placeholder="0 = unlimited">
            </div>

            <div class="dc-field">
              <label for="dcOnWinMode">On Win</label>
              <div class="dc-auto-strategy">
                <select id="dcOnWinMode" class="dc-select">
                  <option value="reset">Reset bet</option>
                  <option value="increase">Increase by</option>
                </select>
                <div class="dc-auto-pct-wrap" id="dcOnWinPctWrap" hidden>
                  <input type="number" id="dcOnWinPct" class="dc-auto-input dc-auto-input--pct" min="0" step="1" value="0">
                  <span class="dc-auto-pct-suffix">%</span>
                </div>
              </div>
            </div>

            <div class="dc-field">
              <label for="dcOnLossMode">On Loss</label>
              <div class="dc-auto-strategy">
                <select id="dcOnLossMode" class="dc-select">
                  <option value="reset">Reset bet</option>
                  <option value="increase">Increase by</option>
                </select>
                <div class="dc-auto-pct-wrap" id="dcOnLossPctWrap" hidden>
                  <input type="number" id="dcOnLossPct" class="dc-auto-input dc-auto-input--pct" min="0" step="1" value="100">
                  <span class="dc-auto-pct-suffix">%</span>
                </div>
              </div>
            </div>

            <div class="dc-field">
              <label for="dcStopProfit">Stop on Profit <span class="dc-label-hint">(optional)</span></label>
              <div class="dc-bet-input-wrap">
                <span class="dc-bet-icon">$</span>
                <input type="number" id="dcStopProfit" class="dc-bet-input" min="0" step="0.01" value="0" placeholder="0 = off">
              </div>
            </div>

            <div class="dc-field">
              <label for="dcStopLoss">Stop on Loss <span class="dc-label-hint">(optional)</span></label>
              <div class="dc-bet-input-wrap">
                <span class="dc-bet-icon">$</span>
                <input type="number" id="dcStopLoss" class="dc-bet-input" min="0" step="0.01" value="0" placeholder="0 = off">
              </div>
            </div>

            <div class="dc-auto-progress" id="dcAutoProgress">
              <div class="dc-auto-progress-row">
                <span class="dc-auto-progress-label">Bets</span>
                <span class="dc-auto-progress-value" id="dcAutoBetCount">0 / 10</span>
              </div>
              <div class="dc-auto-progress-row">
                <span class="dc-auto-progress-label">Session profit</span>
                <span class="dc-auto-progress-value" id="dcAutoProfit">$0.00</span>
              </div>
            </div>

            <button type="button" class="dc-place-bet" id="dcAutoStart">Start Autobet</button>
            <button type="button" class="dc-place-bet dc-place-bet--stop" id="dcAutoStop" hidden>Stop</button>
          </div>

          <p class="dc-message" id="dcMessage"></p>
        </aside>

        <main class="dc-board">
          <div class="dc-board-inner">
            <div class="dc-result-wrap">
              <div class="dc-die" id="dcDie" aria-hidden="true">
                <div class="dc-die-face dc-die-face--front">
                  <span class="dc-pip"></span>
                </div>
              </div>
              <div class="dc-roll-display" id="dcRollDisplay">—</div>
              <p class="dc-roll-label" id="dcRollLabel">Roll to play</p>
            </div>

            <div class="dc-track-wrap">
              <div class="dc-track-labels">
                <span>0</span>
                <span id="dcTrackTarget">50.00</span>
                <span>100</span>
              </div>
              <div class="dc-track" id="dcTrack">
                <div class="dc-track-win" id="dcTrackWin"></div>
                <div class="dc-track-marker" id="dcTrackMarker"></div>
                <div class="dc-track-result" id="dcTrackResult" hidden></div>
              </div>
            </div>
          </div>
          <div class="dc-footer">
            <span class="dc-brand">NBD</span>
          </div>
        </main>

        <aside class="dc-history" id="dcHistory" aria-label="Recent results">
          <span class="dc-history-head">Recent</span>
          <div class="dc-history-list" id="dcHistoryList"></div>
        </aside>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/js/common.js?v=10"></script>
  <script src="/js/dice.js"></script>
</body>
</html>
