<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi-Lo | NBD Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/hilo.css">
</head>
<body data-page="originals">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="url(#logoGrad)" stroke="url(#logoGradBorder)" stroke-width="1.25"/>
            <rect x="4.25" y="4.25" width="23.5" height="23.5" rx="5.5" fill="none" stroke="rgba(245,158,11,0.3)" stroke-width="0.75"/>
            <text x="16" y="20.5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="800" fill="url(#logoTextGrad)" letter-spacing="0.6">NBD</text>
            <circle cx="25.5" cy="6.5" r="1.75" fill="#fbbf24"/>
            <defs>
              <linearGradient id="logoGrad" x1="1.5" y1="1.5" x2="30.5" y2="30.5">
                <stop stop-color="#9333ea"/>
                <stop offset="0.55" stop-color="#581c87"/>
                <stop offset="1" stop-color="#0a0a0a"/>
              </linearGradient>
              <linearGradient id="logoGradBorder" x1="1.5" y1="1.5" x2="30.5" y2="30.5">
                <stop stop-color="#fbbf24"/>
                <stop offset="0.5" stop-color="#f59e0b"/>
                <stop offset="1" stop-color="#9333ea"/>
              </linearGradient>
              <linearGradient id="logoTextGrad" x1="8" y1="12" x2="24" y2="22">
                <stop stop-color="#ffffff"/>
                <stop offset="1" stop-color="#fde68a"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">NBD Casino</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item" data-nav="casino">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Casino
        </a>
        <a href="originals.html" class="nav-item active" data-nav="originals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Originals
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-start">
          <button class="hamburger" id="hamburger" aria-label="Open menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <a href="originals.html" class="hl-back">← Originals</a>
        </div>
        <div class="header-center">
          <div class="header-wallet">
            <button class="wallet-balance" id="walletBalance" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="wallet-currency-icon">$</span>
              <span class="wallet-amount" id="walletAmount">0.00</span>
              <svg class="wallet-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="wallet-deposit" id="walletDeposit" type="button">Deposit</button>
            <div class="wallet-dropdown" id="walletDropdown" hidden>
              <button type="button" class="wallet-option active" data-currency="USD" data-amount="0.00">USD — $0.00</button>
              <button type="button" class="wallet-option" data-currency="BTC" data-amount="0.00000000">BTC — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="ETH" data-amount="0.00000000">ETH — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="LTC" data-amount="0.00000000">LTC — 0.00000000</button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost">Log In</button>
          <button class="btn btn-primary">Register</button>
        </div>
      </header>

      <div class="hl-game">
        <aside class="hl-panel">
          <div class="hl-field">
            <div class="hl-field-head">
              <label for="hlBet">Bet Amount</label>
              <span id="hlBetCurrency">0.00 USD</span>
            </div>
            <div class="hl-bet-row">
              <div class="hl-bet-input-wrap">
                <span class="hl-bet-icon">$</span>
                <input type="number" id="hlBet" class="hl-bet-input" min="0" step="0.01" value="10" placeholder="0.00">
              </div>
              <button type="button" class="hl-bet-adjust" id="hlHalf">1/2</button>
              <button type="button" class="hl-bet-adjust" id="hlDouble">2x</button>
            </div>
          </div>

          <div class="hl-stats">
            <div class="hl-stat">
              <span class="hl-stat-label">Multiplier</span>
              <span class="hl-stat-value" id="hlMultiplier">1.00x</span>
            </div>
            <div class="hl-stat">
              <span class="hl-stat-label">Streak</span>
              <span class="hl-stat-value" id="hlStreak">0</span>
            </div>
            <div class="hl-stat">
              <span class="hl-stat-label">Cash Out</span>
              <span class="hl-stat-value hl-stat-value--blue" id="hlCashout">$0.00</span>
            </div>
          </div>

          <button type="button" class="hl-action" id="hlStartBtn">Start Round</button>
          <button type="button" class="hl-action hl-action--cashout" id="hlCashoutBtn" hidden>Cash Out</button>

          <p class="hl-message" id="hlMessage"></p>
        </aside>

        <main class="hl-board">
          <div class="hl-board-inner">
            <div class="hl-stage" id="hlStage">
              <div class="hl-card-wrap">
                <div class="hl-playing-card hl-playing-card--empty" id="hlCard">
                  <span class="hl-pcard-idle">—</span>
                  <span class="hl-card-label">Current</span>
                </div>
                <div class="hl-next-preview" id="hlNextPreview" hidden>
                  <span class="hl-next-arrow">→</span>
                  <div class="hl-playing-card hl-playing-card--next" id="hlNextCard"></div>
                </div>
              </div>

              <div class="hl-guess-row" id="hlGuessRow" hidden>
                <button type="button" class="hl-guess hl-guess--lo" id="hlLo">
                  <span class="hl-guess-icon">↓</span>
                  <span class="hl-guess-label">Lower</span>
                  <span class="hl-guess-chance" id="hlLoChance">0%</span>
                  <span class="hl-guess-mult" id="hlLoMult">—</span>
                </button>
                <button type="button" class="hl-guess hl-guess--hi" id="hlHi">
                  <span class="hl-guess-icon">↑</span>
                  <span class="hl-guess-label">Higher</span>
                  <span class="hl-guess-chance" id="hlHiChance">0%</span>
                  <span class="hl-guess-mult" id="hlHiMult">—</span>
                </button>
              </div>

              <p class="hl-status" id="hlStatus">Place your bet and start a round</p>
            </div>

            <div class="hl-result-popup" id="hlResultPopup" hidden>
              <div class="hl-result-popup-card" id="hlResultCard">
                <p class="hl-result-popup-label" id="hlPopupLabel"></p>
                <div class="hl-result-popup-mult" id="hlPopupMult"></div>
                <p class="hl-result-popup-text" id="hlPopupText"></p>
              </div>
            </div>
          </div>
          <div class="hl-footer">
            <span class="hl-brand">NBD</span>
          </div>
        </main>

        <aside class="hl-history" aria-label="Recent rounds">
          <span class="hl-history-head">Recent</span>
          <div class="hl-history-list" id="hlHistoryList">
            <p class="hl-history-empty">No rounds yet</p>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/js/common.js"></script>
  <script src="/js/hilo.js"></script>
</body>
</html>
