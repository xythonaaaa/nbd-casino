<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <title>Keno | NBD Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/keno.css?v=2">
</head>
<body data-page="originals">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="6.5" fill="url(#logoGrad)"/>
            <text x="16" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#logoTextGrad)" letter-spacing="-0.1">NBD</text>
            <defs>
              <linearGradient id="logoGrad" x1="2" y1="2" x2="30" y2="30">
                <stop stop-color="#7c3aed"/>
                <stop offset="0.5" stop-color="#4c1d95"/>
                <stop offset="1" stop-color="#12041f"/>
              </linearGradient>
              <linearGradient id="logoTextGrad" x1="11" y1="12" x2="21" y2="20">
                <stop stop-color="#ffffff"/>
                <stop offset="1" stop-color="#fde68a"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">NBD Casino</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item" data-nav="casino">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Casino
        </a>
        <a href="originals.html" class="nav-item active" data-nav="originals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Originals
        </a>
        <a href="leaderboard.html" class="nav-item" data-nav="leaderboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0012 0V2z"/></svg>
          Leaderboard
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-start">
          <button class="hamburger" id="hamburger" aria-label="Open menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <a href="originals.html" class="kn-back">← Originals</a>
        </div>
        <div class="header-center">
          <div class="header-wallet">
            <button class="wallet-balance" id="walletBalance" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="wallet-currency-icon">$</span>
              <span class="wallet-amount" id="walletAmount">0.00</span>
              <svg class="wallet-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="wallet-deposit" id="walletDeposit" type="button">Deposit</button>
            <div class="wallet-dropdown" id="walletDropdown" hidden>
              <button type="button" class="wallet-option active" data-currency="USD" data-amount="0.00">USD — $0.00</button>
              <button type="button" class="wallet-option" data-currency="BTC" data-amount="0.00000000">BTC — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="ETH" data-amount="0.00000000">ETH — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="LTC" data-amount="0.00000000">LTC — 0.00000000</button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost">Log In</button>
          <button class="btn btn-primary">Register</button>
        </div>
      </header>

      <div class="kn-game">
        <aside class="kn-panel">
          <div class="kn-tabs">
            <button type="button" class="kn-tab active" id="knTabManual">Manual</button>
            <button type="button" class="kn-tab" id="knTabAuto">Auto</button>
          </div>

          <div class="kn-field">
            <div class="kn-field-head">
              <label for="knBet">Bet Amount</label>
              <span id="knBetCurrency">0.00 USD</span>
            </div>
            <div class="kn-bet-row">
              <div class="kn-bet-input-wrap">
                <span class="kn-bet-icon">$</span>
                <input type="number" id="knBet" class="kn-bet-input" min="0" step="0.01" value="10" placeholder="0.00">
              </div>
              <button type="button" class="kn-bet-adjust" id="knHalf">1/2</button>
              <button type="button" class="kn-bet-adjust" id="knDouble">2x</button>
            </div>
          </div>

          <div class="kn-stats">
            <div class="kn-stat">
              <span class="kn-stat-label">Spots</span>
              <span class="kn-stat-value" id="knSpotCount">0 / 10</span>
            </div>
            <div class="kn-stat">
              <span class="kn-stat-label">Hits</span>
              <span class="kn-stat-value" id="knHits">—</span>
            </div>
            <div class="kn-stat kn-stat--wide">
              <span class="kn-stat-label">Payout</span>
              <span class="kn-stat-value kn-stat-value--teal" id="knPayout">—</span>
            </div>
          </div>

          <div class="kn-paytable" id="knPaytable">
            <span class="kn-paytable-head">Paytable</span>
            <div class="kn-paytable-rows" id="knPaytableRows">
              <p class="kn-paytable-empty">Pick numbers to see payouts</p>
            </div>
          </div>

          <div class="kn-actions-row">
            <button type="button" class="kn-secondary" id="knClear">Clear</button>
            <button type="button" class="kn-secondary" id="knQuickPick">Quick Pick</button>
          </div>

          <div id="knManualActions">
            <button type="button" class="kn-action" id="knBetBtn">Place Bet</button>
          </div>

          <div id="knAutoPanel" hidden>
            <div class="kn-field">
              <label for="knAutoBets">Number of Bets</label>
              <div class="kn-auto-bets-row">
                <input type="number" id="knAutoBets" class="kn-auto-input" min="1" step="1" value="100" placeholder="100">
                <button type="button" class="kn-auto-infinity" id="knAutoInfinity" title="Unlimited bets" aria-pressed="false">∞</button>
              </div>
            </div>

            <div class="kn-auto-progress" id="knAutoProgress" hidden>
              <div class="kn-auto-progress-row">
                <span class="kn-auto-progress-label">Bets</span>
                <span class="kn-auto-progress-value" id="knAutoBetCount">0 / 100</span>
              </div>
              <div class="kn-auto-progress-row">
                <span class="kn-auto-progress-label">Session profit</span>
                <span class="kn-auto-progress-value" id="knAutoProfit">+$0.00</span>
              </div>
            </div>

            <button type="button" class="kn-action" id="knAutoStart">Start Autobet</button>
            <button type="button" class="kn-action kn-action--stop" id="knAutoStop" hidden>Stop</button>
          </div>

          <p class="kn-message" id="knMessage"></p>
        </aside>

        <main class="kn-board">
          <div class="kn-board-inner">
            <div class="kn-grid-wrap">
              <p class="kn-hint" id="knHint">Pick 1–10 numbers from 1–40, then place your bet</p>
              <div class="kn-grid" id="knGrid" aria-label="Keno number board"></div>
            </div>
          </div>
          <div class="kn-footer">
            <span class="kn-brand">NBD</span>
          </div>
        </main>

        <aside class="kn-history" id="knHistory" aria-label="Recent bets">
          <span class="kn-history-head">Recent Bets</span>
          <div class="kn-history-list" id="knHistoryList">
            <p class="kn-history-empty">No bets yet</p>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/js/common.js?v=8"></script>
  <script src="/js/keno.js?v=2"></script>
</body>
</html>
