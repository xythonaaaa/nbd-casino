<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <title>Limbo | NBD Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/limbo.css">
</head>
<body data-page="originals">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="6.5" fill="url(#logoGrad)"/>
            <text x="16" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#logoTextGrad)" letter-spacing="-0.1">NBD</text>
            <defs>
              <linearGradient id="logoGrad" x1="2" y1="2" x2="30" y2="30">
                <stop stop-color="#7c3aed"/>
                <stop offset="0.5" stop-color="#4c1d95"/>
                <stop offset="1" stop-color="#12041f"/>
              </linearGradient>
              <linearGradient id="logoTextGrad" x1="11" y1="12" x2="21" y2="20">
                <stop stop-color="#ffffff"/>
                <stop offset="1" stop-color="#fde68a"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">NBD Casino</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item" data-nav="casino">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Casino
        </a>
        <a href="originals.html" class="nav-item active" data-nav="originals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Originals
        </a>
        <a href="leaderboard.html" class="nav-item" data-nav="leaderboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0012 0V2z"/></svg>
          Leaderboard
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-start">
          <button class="hamburger" id="hamburger" aria-label="Open menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <a href="originals.html" class="lb-back">← Originals</a>
        </div>
        <div class="header-center">
          <div class="header-wallet">
            <button class="wallet-balance" id="walletBalance" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="wallet-currency-icon">$</span>
              <span class="wallet-amount" id="walletAmount">0.00</span>
              <svg class="wallet-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="wallet-deposit" id="walletDeposit" type="button">Deposit</button>
            <div class="wallet-dropdown" id="walletDropdown" hidden>
              <button type="button" class="wallet-option active" data-currency="USD" data-amount="0.00">USD — $0.00</button>
              <button type="button" class="wallet-option" data-currency="BTC" data-amount="0.00000000">BTC — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="ETH" data-amount="0.00000000">ETH — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="LTC" data-amount="0.00000000">LTC — 0.00000000</button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost">Log In</button>
          <button class="btn btn-primary">Register</button>
        </div>
      </header>

      <div class="lb-game">
        <aside class="lb-panel">
          <div class="lb-tabs">
            <button type="button" class="lb-tab active" id="lbTabManual">Manual</button>
            <button type="button" class="lb-tab" id="lbTabAuto">Auto</button>
          </div>

          <div class="lb-field">
            <div class="lb-field-head">
              <label for="lbBet">Bet Amount</label>
              <span id="lbBetCurrency">0.00 USD</span>
            </div>
            <div class="lb-bet-row">
              <div class="lb-bet-input-wrap">
                <span class="lb-bet-icon">$</span>
                <input type="number" id="lbBet" class="lb-bet-input" min="0" step="0.01" value="10" placeholder="0.00">
              </div>
              <button type="button" class="lb-bet-adjust" id="lbHalf">1/2</button>
              <button type="button" class="lb-bet-adjust" id="lbDouble">2x</button>
            </div>
          </div>

          <div class="lb-field">
            <label for="lbTarget">Target Multiplier</label>
            <div class="lb-bet-input-wrap">
              <span class="lb-bet-icon lb-bet-icon--x">x</span>
              <input type="number" id="lbTarget" class="lb-bet-input" min="1.01" step="0.01" value="2.00">
            </div>
            <div class="lb-target-presets">
              <button type="button" class="lb-preset" data-target="2">2x</button>
              <button type="button" class="lb-preset" data-target="5">5x</button>
              <button type="button" class="lb-preset" data-target="10">10x</button>
              <button type="button" class="lb-preset" data-target="50">50x</button>
            </div>
          </div>

          <div class="lb-stats">
            <div class="lb-stat">
              <span class="lb-stat-label">Win Chance</span>
              <span class="lb-stat-value" id="lbWinChance">49.50%</span>
            </div>
            <div class="lb-stat">
              <span class="lb-stat-label">Profit on Win</span>
              <span class="lb-stat-value lb-stat-value--purple" id="lbProfit">+$10.00</span>
            </div>
          </div>

          <div id="lbManualActions">
            <button type="button" class="lb-action" id="lbBetBtn">Place Bet</button>
          </div>

          <div id="lbAutoPanel" hidden>
            <div class="lb-field">
              <label for="lbAutoBets">Number of Bets</label>
              <div class="lb-auto-bets-row">
                <input type="number" id="lbAutoBets" class="lb-auto-input" min="1" step="1" value="100">
                <button type="button" class="lb-auto-infinity" id="lbAutoInfinity" title="Unlimited bets" aria-pressed="false">∞</button>
              </div>
            </div>

            <div class="lb-auto-progress" id="lbAutoProgress" hidden>
              <div class="lb-auto-progress-row">
                <span class="lb-auto-progress-label">Bets</span>
                <span class="lb-auto-progress-value" id="lbAutoBetCount">0 / 100</span>
              </div>
              <div class="lb-auto-progress-row">
                <span class="lb-auto-progress-label">Session profit</span>
                <span class="lb-auto-progress-value" id="lbAutoProfit">+$0.00</span>
              </div>
            </div>

            <button type="button" class="lb-action" id="lbAutoStart">Start Autobet</button>
            <button type="button" class="lb-action lb-action--stop" id="lbAutoStop" hidden>Stop</button>
          </div>

          <p class="lb-message" id="lbMessage"></p>
        </aside>

        <main class="lb-board">
          <div class="lb-board-inner">
            <div class="lb-stage" id="lbStage">
              <p class="lb-target-label">Target <span id="lbTargetDisplay">2.00x</span></p>
              <div class="lb-result" id="lbResult">1.00x</div>
              <p class="lb-status" id="lbStatus">Set target and place your bet</p>
            </div>

            <div class="lb-result-popup" id="lbResultPopup" hidden>
              <div class="lb-result-popup-card" id="lbResultCard">
                <p class="lb-result-popup-label" id="lbResultLabel"></p>
                <div class="lb-result-popup-mult" id="lbResultMult"></div>
                <p class="lb-result-popup-text" id="lbResultText"></p>
              </div>
            </div>
          </div>
          <div class="lb-footer">
            <span class="lb-brand">NBD</span>
          </div>
        </main>

        <aside class="lb-history" aria-label="Recent bets">
          <span class="lb-history-head">Recent</span>
          <div class="lb-history-list" id="lbHistoryList">
            <p class="lb-history-empty">No bets yet</p>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/js/common.js?v=7"></script>
  <script src="/js/limbo.js"></script>
</body>
</html>
