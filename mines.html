<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mines | NBD Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/mines.css">
</head>
<body data-page="originals">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="url(#logoGrad)" stroke="url(#logoGradBorder)" stroke-width="1.25"/>
            <rect x="4.25" y="4.25" width="23.5" height="23.5" rx="5.5" fill="none" stroke="rgba(245,158,11,0.3)" stroke-width="0.75"/>
            <text x="16" y="20.5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="800" fill="url(#logoTextGrad)" letter-spacing="0.6">NBD</text>
            <circle cx="25.5" cy="6.5" r="1.75" fill="#fbbf24"/>
            <defs>
              <linearGradient id="logoGrad" x1="1.5" y1="1.5" x2="30.5" y2="30.5">
                <stop stop-color="#9333ea"/>
                <stop offset="0.55" stop-color="#581c87"/>
                <stop offset="1" stop-color="#0a0a0a"/>
              </linearGradient>
              <linearGradient id="logoGradBorder" x1="1.5" y1="1.5" x2="30.5" y2="30.5">
                <stop stop-color="#fbbf24"/>
                <stop offset="0.5" stop-color="#f59e0b"/>
                <stop offset="1" stop-color="#9333ea"/>
              </linearGradient>
              <linearGradient id="logoTextGrad" x1="8" y1="12" x2="24" y2="22">
                <stop stop-color="#ffffff"/>
                <stop offset="1" stop-color="#fde68a"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">NBD Casino</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item" data-nav="casino">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Casino
        </a>
        <a href="originals.html" class="nav-item active" data-nav="originals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Originals
        </a>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-start">
          <button class="hamburger" id="hamburger" aria-label="Open menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <a href="originals.html" class="mn-back">← Originals</a>
        </div>
        <div class="header-center">
          <div class="header-wallet">
            <button class="wallet-balance" id="walletBalance" type="button" aria-haspopup="true" aria-expanded="false">
              <span class="wallet-currency-icon">$</span>
              <span class="wallet-amount" id="walletAmount">0.00</span>
              <svg class="wallet-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="wallet-deposit" id="walletDeposit" type="button">Deposit</button>
            <div class="wallet-dropdown" id="walletDropdown" hidden>
              <button type="button" class="wallet-option active" data-currency="USD" data-amount="0.00">USD — $0.00</button>
              <button type="button" class="wallet-option" data-currency="BTC" data-amount="0.00000000">BTC — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="ETH" data-amount="0.00000000">ETH — 0.00000000</button>
              <button type="button" class="wallet-option" data-currency="LTC" data-amount="0.00000000">LTC — 0.00000000</button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost">Log In</button>
          <button class="btn btn-primary">Register</button>
        </div>
      </header>

      <div class="mn-game">
        <aside class="mn-panel">
          <div class="mn-tabs">
            <button type="button" class="mn-tab active" id="mnTabManual">Manual</button>
            <button type="button" class="mn-tab" id="mnTabAuto">Auto</button>
          </div>

          <div class="mn-field">
            <div class="mn-field-head">
              <label for="mnBet">Bet Amount</label>
              <span id="mnBetCurrency">0.00 USD</span>
            </div>
            <div class="mn-bet-row">
              <div class="mn-bet-input-wrap">
                <span class="mn-bet-icon">$</span>
                <input type="number" id="mnBet" class="mn-bet-input" min="0" step="0.01" value="10" placeholder="0.00">
              </div>
              <button type="button" class="mn-bet-adjust" id="mnHalf">1/2</button>
              <button type="button" class="mn-bet-adjust" id="mnDouble">2x</button>
            </div>
          </div>

          <div class="mn-field">
            <label for="mnMines">Mines</label>
            <select id="mnMines" class="mn-select mn-select--mines"></select>
          </div>

          <div id="mnManualPanel">
            <div class="mn-live-stats" id="mnLiveStats" hidden>
              <div class="mn-live-stat">
                <span class="mn-live-stat-label">Multiplier</span>
                <span class="mn-live-stat-value" id="mnMultiplier">1.00x</span>
              </div>
              <div class="mn-live-stat">
                <span class="mn-live-stat-label">Gems</span>
                <span class="mn-live-stat-value" id="mnGemsFound">0</span>
              </div>
              <button type="button" class="mn-live-cashout" id="mnCashoutStat">
                <span class="mn-live-stat-label">Cashout</span>
                <span class="mn-live-stat-value mn-live-stat-value--green" id="mnCashoutValue">$0.00</span>
              </button>
            </div>

            <div id="mnManualActions">
              <button type="button" class="mn-action mn-action--bet" id="mnBetBtn">Place Bet</button>
              <button type="button" class="mn-action mn-action--cashout" id="mnCashoutBtn" hidden>Cash Out</button>
              <button type="button" class="mn-action mn-action--pick" id="mnPickRandom" hidden>Pick Random</button>
            </div>
          </div>

          <div id="mnAutoPanel" hidden>
            <div class="mn-field">
              <label for="mnAutoBets">Number of Bets</label>
              <div class="mn-auto-bets-row">
                <input type="number" id="mnAutoBets" class="mn-auto-input" min="0" step="1" value="0" placeholder="0">
                <button type="button" class="mn-auto-infinity active" id="mnAutoInfinity" title="Unlimited bets" aria-pressed="true">∞</button>
              </div>
            </div>

            <div class="mn-auto-advanced-head">
              <span class="mn-auto-advanced-label">Advanced Settings</span>
              <button type="button" class="mn-auto-toggle" id="mnAutoAdvancedToggle" role="switch" aria-checked="false" aria-label="Advanced settings">
                <span class="mn-auto-toggle-knob"></span>
              </button>
            </div>

            <div class="mn-auto-advanced" id="mnAutoAdvanced" hidden>
              <div class="mn-field">
                <label for="mnOnWinMode">On Win</label>
                <div class="mn-auto-strategy">
                  <select id="mnOnWinMode" class="mn-select">
                    <option value="reset">Reset bet</option>
                    <option value="increase">Increase by</option>
                  </select>
                  <div class="mn-auto-pct-wrap" id="mnOnWinPctWrap" hidden>
                    <input type="number" id="mnOnWinPct" class="mn-auto-input mn-auto-input--pct" min="0" step="1" value="0">
                    <span class="mn-auto-pct-suffix">%</span>
                  </div>
                </div>
              </div>

              <div class="mn-field">
                <label for="mnOnLossMode">On Loss</label>
                <div class="mn-auto-strategy">
                  <select id="mnOnLossMode" class="mn-select">
                    <option value="reset">Reset bet</option>
                    <option value="increase">Increase by</option>
                  </select>
                  <div class="mn-auto-pct-wrap" id="mnOnLossPctWrap" hidden>
                    <input type="number" id="mnOnLossPct" class="mn-auto-input mn-auto-input--pct" min="0" step="1" value="100">
                    <span class="mn-auto-pct-suffix">%</span>
                  </div>
                </div>
              </div>

              <div class="mn-field">
                <label for="mnStopProfit">Stop on Profit</label>
                <div class="mn-bet-input-wrap">
                  <span class="mn-bet-icon">$</span>
                  <input type="number" id="mnStopProfit" class="mn-bet-input" min="0" step="0.01" value="0" placeholder="0">
                </div>
              </div>

              <div class="mn-field">
                <label for="mnStopLoss">Stop on Loss</label>
                <div class="mn-bet-input-wrap">
                  <span class="mn-bet-icon">$</span>
                  <input type="number" id="mnStopLoss" class="mn-bet-input" min="0" step="0.01" value="0" placeholder="0">
                </div>
              </div>
            </div>

            <div class="mn-auto-progress" id="mnAutoProgress" hidden>
              <div class="mn-auto-progress-row">
                <span class="mn-auto-progress-label">Bets</span>
                <span class="mn-auto-progress-value" id="mnAutoBetCount">0 / ∞</span>
              </div>
              <div class="mn-auto-progress-row">
                <span class="mn-auto-progress-label">Session profit</span>
                <span class="mn-auto-progress-value" id="mnAutoProfit">+$0.00</span>
              </div>
            </div>

            <button type="button" class="mn-action mn-action--bet" id="mnAutoStart">Start Autobet</button>
            <button type="button" class="mn-action mn-action--stop" id="mnAutoStop" hidden>Stop</button>
          </div>

          <p class="mn-message" id="mnMessage"></p>
        </aside>

        <main class="mn-board">
          <div class="mn-board-inner">
            <div class="mn-grid-wrap">
              <p class="mn-grid-hint" id="mnGridHint" hidden></p>
              <div class="mn-grid" id="mnGrid" aria-label="Mines grid"></div>
            </div>
          </div>
          <div class="mn-footer">
            <div class="mn-footer-tools">
              <span class="mn-footer-icon" title="Settings">⚙</span>
              <span class="mn-footer-icon" title="Provably fair">⚖</span>
              <span class="mn-footer-icon" title="Stats">📈</span>
            </div>
            <span class="mn-brand">NBD</span>
          </div>
        </main>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="/js/common.js"></script>
  <script src="/js/mines.js"></script>
</body>
</html>
