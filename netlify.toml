[build]
  command = "npm install && if [ -f scripts/verify-assets.mjs ]; then npm run verify; else echo 'verify-assets.mjs missing — skipping file checks'; fi"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "http://nbdcasino.com/*"
  to = "https://nbdcasino.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.nbdcasino.com/*"
  to = "https://nbdcasino.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
