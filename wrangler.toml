# NBD Casino — Cloudflare Pages + Workers KV
# Pages auto-deploys static files + functions/ from the repo root.
# Do NOT run `wrangler deploy` — that is for standalone Workers only.
# Local dev: `npm run dev:cf` (wrangler pages dev .)

name = "nbd-casino"
compatibility_date = "2024-06-01"
pages_build_output_dir = "."

# KV bindings for local `wrangler pages dev`.
# Production/preview deploys also need bindings under Pages → Settings → Functions.

